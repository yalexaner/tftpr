# cargo-deny configuration
# docs: https://embarkstudios.github.io/cargo-deny/

# check for known vulnerabilities in the RustSec advisory database
[advisories]
yanked = "deny"

# check dependency licenses against allowlist
[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
]
confidence-threshold = 0.8

[licenses.private]
ignore = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
